name: Scheduled Sync

on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨 0 点（UTC）执行自动同步
  workflow_dispatch:    # 保留手动触发按钮

jobs:
  sync_latest_from_upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 获取完整的 Git 提交历史

      - name: Sync from Upstream
        run: |
          # 1. 设置机器人 Git 用户信息
          git config --global user.name 'GitHub Actions'
          git config --global user.email 'actions@github.com'
          
          # 2. 绑定原作者的上游仓库地址（请替换为实际地址）
          git remote add upstream https://github.com/krahets/hello-algo.git
          
          # 3. 拉取原作者的最新代码
          git fetch upstream
          
          # 4. 合并原作者的 main 分支到你自己的 main 分支
          # 采用标准 merge，避免因你自己新增了文件（如本脚本）导致快进合并失败
          git checkout main
          git merge upstream/main -m "Auto-merge upstream changes" || (echo "检测到代码冲突，请手动解决" && exit 1)
          
          # 5. 推送回你自己的仓库
          git push origin main
